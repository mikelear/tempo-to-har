# _resources.tpl, _security.tpl) are inlined in templates/ rather than
# consumed as a chart dependency. Chart.yaml doesn't support env-var
# templating, so oci://{{ .JX_CHART_REPOSITORY }} can't resolve — helmfile
# only templates .gotmpl files. TODO: re-wire as a chart dep once
# leartech-helm-library is published via a helm-repo index (GitHub Pages or
# similar) — then `repository: https://mikelear.github.io/leartech-helm-library`
# would work without templating.
