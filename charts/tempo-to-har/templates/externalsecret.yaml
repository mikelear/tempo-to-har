# ExternalSecret — syncs the database credentials from the cluster's secret
# backend (GSM on GCP, AKV on Azure). The `SecretStore` is cluster-installed
# and varies per cluster — the chart just references it by name.
#
# If you don't need ESO (e.g. running in a local cluster), set
# .Values.database.externalSecret.enabled=false and provision the secret
# by another means.
{{- if and .Values.database.enabled (.Values.database.externalSecret.enabled | default true) }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Values.database.secretName }}
  labels:
    {{- include "leartech.labels" . | nindent 4 }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: {{ .Values.database.externalSecret.storeRef | default "cluster-secret-store" }}
    kind: {{ .Values.database.externalSecret.storeKind | default "ClusterSecretStore" }}
  target:
    name: {{ .Values.database.secretName }}
    creationPolicy: Owner
  data:
  - secretKey: {{ .Values.database.secretKey }}
    remoteRef:
      key: {{ .Values.database.externalSecret.remoteKey | default (printf "%s-database-url" (include "leartech.fullname" .)) }}
{{- end }}
