{{- if and .Values.migrations.enabled .Values.database.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "leartech.fullname" . }}-migrations
  labels:
    {{- include "leartech.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation
data:
  {{- $files := .Files.Glob "migrations/*.sql" }}
  {{- range $path, $bytes := $files }}
  {{ base $path }}: |
{{ $.Files.Get $path | indent 4 }}
  {{- end }}
{{- end }}
