# The authoritative spec is generated from code annotations in
# cmd/server/main.go + internal/handlers/*.go via swaggo/swag (see Makefile
# `swag` target).
#
# This file is a placeholder — the live spec is served at /openapi.json from
# the running service, and consumer clients are generated by the pipeline via
# `uses:mikelear/leartech-openapi-generation/pipeline/generate-packages.yaml@main`.
#
# Why no hand-maintained YAML: per hub/shared-rules/conventions.md § "OpenAPI /
# Swagger" — "spec-first, not hand-maintained YAML that rots". Annotations in
# code are the source of truth; this file exists only so `api/openapi.yaml`
# has somewhere to point people who grep for it.
