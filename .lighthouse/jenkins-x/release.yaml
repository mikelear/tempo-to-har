apiVersion: tekton.dev/v1beta1
kind: PipelineRun
metadata:
  creationTimestamp: null
  name: release
spec:
  pipelineSpec:
    tasks:
    - name: from-build-pack
      resources: {}
      taskSpec:
        metadata: {}
        stepTemplate:
          image: uses:mikelear/leartech-pipeline-catalog/tasks/go/release.yaml@main
          name: ""
          resources: {}
          workingDir: /workspace/source
        steps:
        - name: ""
          resources: {}
    # tempo-to-har is a CronJob-driven synthesizer with no public HTTP API
    # — no SDK consumers. Removed openapi-generation per Session 0c lesson #5
    # (golden Go template's release.yaml assumes consumer is an HTTP service;
    # for non-API services the codegen task must be removed).
  podTemplate:
    tolerations:
    - key: sku
      operator: Equal
      value: build
      effect: NoSchedule
  serviceAccountName: tekton-bot
  timeout: 12h0m0s
status: {}
