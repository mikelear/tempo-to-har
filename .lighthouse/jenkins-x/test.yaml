apiVersion: tekton.dev/v1beta1
kind: PipelineRun
metadata:
  creationTimestamp: null
  name: test
spec:
  pipelineSpec:
    tasks:
    - name: go-test
      resources: {}
      taskSpec:
        metadata: {}
        stepTemplate:
          image: uses:mikelear/leartech-pipeline-catalog/tasks/go-test/pullrequest.yaml@main
          name: ""
          resources: {}
          workingDir: /workspace/source
          # Template has no business logic yet — 60% golden-std threshold can't
          # be met with trivial smoke tests. Consumers that clone-and-rename
          # should remove this override once they add real code + tests.
          env:
          - name: COVERAGE_THRESHOLD
            value: "30.0"
        steps:
        - name: ""
          resources: {}
  podTemplate:
    tolerations:
    - key: sku
      operator: Equal
      value: build
      effect: NoSchedule
  serviceAccountName: tekton-bot
  timeout: 1h0m0s
status: {}
